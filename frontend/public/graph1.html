<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程文本抽取对比：普通提示词 vs 可追溯抽取</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0d3b66 0%, #2a9d8f 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }
    .header {
      padding: 28px;
      color: #fff;
      background: linear-gradient(135deg, #0d3b66, #2a9d8f);
      text-align: center;
    }
    .header h1 { font-size: 30px; margin-bottom: 8px; }
    .header p { opacity: 0.95; }
    .input-section {
      padding: 24px;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
    }
    .input-text {
      margin-top: 12px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 13px;
    }
    .panel-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .panel {
      padding: 22px;
      border-right: 1px solid #e5e7eb;
    }
    .panel:last-child { border-right: none; }
    .panel h2 {
      font-size: 20px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat {
      background: #f1f5f9;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat .n { font-size: 22px; font-weight: 700; color: #0d3b66; }
    .stat .k { font-size: 12px; color: #475569; }
    .group { margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .group h3 {
      background: #eef2ff;
      padding: 10px 12px;
      font-size: 14px;
      color: #1e3a8a;
    }
    .item {
      padding: 10px 12px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
    }
    .pos { color: #64748b; }
    .analysis {
      border-top: 1px solid #e5e7eb;
      background: #f8fafc;
      padding: 22px;
    }
    .cards {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
    }
    .card strong { display: block; font-size: 18px; color: #0d3b66; margin-top: 4px; }
    @media (max-width: 980px) {
      .panel-wrap { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid #e5e7eb; }
      .cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔬 课程文本抽取对比</h1>
      <p>普通提示词抽取 vs 可追溯教学抽取（示例数据）</p>
    </div>

    <div class="input-section">
      <h3>📝 测试文本（课程知识点）</h3>
      <div class="input-text">叠加定理指出：在线性电路中，多个独立电源共同作用时的响应等于各独立电源单独作用响应的代数和。
该定理适用于线性网络，不适用于含非线性元件的电路。含受控源场景中，受控源不能直接置零。
节点方程可写为 G·V = I，电压单位为 V，电流单位为 A。</div>
    </div>

    <div class="panel-wrap">
      <div class="panel">
        <h2>📝 普通提示词抽取</h2>
        <div class="stats" id="statsA"></div>
        <div id="listA"></div>
      </div>
      <div class="panel">
        <h2>✅ 可追溯教学抽取</h2>
        <div class="stats" id="statsB"></div>
        <div id="listB"></div>
      </div>
    </div>

    <div class="analysis">
      <h3>📊 对比结论</h3>
      <div class="cards" id="cards"></div>
    </div>
  </div>

  <script>
    const rawA = [
      { cls: '定理', text: '叠加定理', pos: null },
      { cls: '条件', text: '线性电路', pos: null },
      { cls: '条件', text: '线性网络', pos: null },
      { cls: '条件', text: '线性网络', pos: null },
      { cls: '事件', text: '不能直接置零', pos: null },
      { cls: '公式', text: 'G·V = I', pos: null },
      { cls: '单位', text: 'V', pos: null },
      { cls: '单位', text: 'A', pos: null }
    ];

    const rawB = [
      { cls: '定理', text: '叠加定理', pos: [0, 4] },
      { cls: '适用条件', text: '线性电路', pos: [8, 12] },
      { cls: '适用条件', text: '线性网络', pos: [47, 51] },
      { cls: '注意事项', text: '受控源不能直接置零', pos: [70, 80] },
      { cls: '公式', text: 'G·V = I', pos: [88, 95] },
      { cls: '单位', text: 'V', pos: [102, 103] },
      { cls: '单位', text: 'A', pos: [110, 111] }
    ];

    function countByType(arr) {
      return arr.reduce((m, x) => {
        m[x.cls] = (m[x.cls] || 0) + 1;
        return m;
      }, {});
    }

    function duplicateCount(arr) {
      const m = {};
      arr.forEach(x => m[x.text] = (m[x.text] || 0) + 1);
      return Object.values(m).filter(v => v > 1).length;
    }

    function renderStats(id, arr) {
      const types = Object.keys(countByType(arr)).length;
      const posCnt = arr.filter(x => Array.isArray(x.pos)).length;
      document.getElementById(id).innerHTML = [
        `<div class="stat"><div class="n">${arr.length}</div><div class="k">实体数</div></div>`,
        `<div class="stat"><div class="n">${types}</div><div class="k">类型数</div></div>`,
        `<div class="stat"><div class="n">${posCnt}</div><div class="k">有定位</div></div>`
      ].join('');
    }

    function renderList(id, arr) {
      const grouped = countByType(arr);
      const keys = Object.keys(grouped);
      const html = keys.map(k => {
        const rows = arr.filter(x => x.cls === k).map(x => {
          const p = Array.isArray(x.pos) ? `[${x.pos[0]}-${x.pos[1]}]` : '无定位';
          return `<div class="item"><span>${x.text}</span><span class="pos">${p}</span></div>`;
        }).join('');
        return `<div class="group"><h3>${k}（${grouped[k]}）</h3>${rows}</div>`;
      }).join('');
      document.getElementById(id).innerHTML = html;
    }

    function renderCards() {
      const dA = duplicateCount(rawA);
      const dB = duplicateCount(rawB);
      const pA = rawA.filter(x => x.pos).length;
      const pB = rawB.filter(x => x.pos).length;
      const cards = [
        { title: '重复实体类型', v: `${dA} → ${dB}`, desc: '可追溯抽取减少重复' },
        { title: '位置定位数量', v: `${pA} → ${pB}`, desc: '支持跨度级证据回溯' },
        { title: '关键条件保留', v: '更完整', desc: '“受控源不能置零”被保留' },
        { title: '教学可验证性', v: '显著提升', desc: '更适合导学问答' }
      ];
      document.getElementById('cards').innerHTML = cards.map(c =>
        `<div class="card">${c.title}<strong>${c.v}</strong>${c.desc}</div>`
      ).join('');
    }

    renderStats('statsA', rawA);
    renderStats('statsB', rawB);
    renderList('listA', rawA);
    renderList('listB', rawB);
    renderCards();
  </script>
</body>
</html>
