<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识图谱演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff, #f0f0f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: rgba(255,255,255,0.9);
    }
    .demo-box {
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
    }
    .feature {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🕸️ 知识图谱演示</h1>
    <p>这是一个静态演示页面示例。你可以在这里展示知识图谱、数据可视化或其他内容。</p>

    <div class="demo-box">
      <h2 style="margin-bottom: 15px;">功能特性</h2>
      <div class="feature">📊 数据可视化</div>
      <div class="feature">🔍 智能检索</div>
      <div class="feature">🤖 AI 增强</div>
      <div class="feature">📈 实时分析</div>
    </div>

    <p style="margin-top: 30px; font-size: 14px; color: rgba(255,255,255,0.7);">
      提示：你可以替换这个文件的内容为你自己的演示页面
    </p>
  </div>
</body>
</html>
