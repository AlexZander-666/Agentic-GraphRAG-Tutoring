<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教学知识图谱演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #154a9c 0%, #1f7a6b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      max-width: 860px;
      width: 100%;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }
    h1 { font-size: 34px; margin-bottom: 14px; }
    p { line-height: 1.7; color: rgba(255, 255, 255, 0.92); }
    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .item {
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
    }
    .item strong { display: block; margin-bottom: 8px; }
    .note {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🕸️ 教学知识图谱演示</h1>
    <p>
      该页面用于展示“课程知识点-工程习题-学习日志”三类教学数据如何被组织为可追溯图谱。
      目标是让学生先看到证据，再理解结论。
    </p>

    <div class="grid">
      <div class="item">
        <strong>📘 课程知识点层</strong>
        抽取概念、定理、公式与适用条件
      </div>
      <div class="item">
        <strong>🧮 工程习题层</strong>
        对齐“已知-目标-约束-推导-结论”
      </div>
      <div class="item">
        <strong>📝 学习日志层</strong>
        追踪错因、纠正策略与掌握度变化
      </div>
      <div class="item">
        <strong>📍 双粒度检索</strong>
        文档块检索 + 字符跨度级证据定位
      </div>
      <div class="item">
        <strong>✅ 证据优先问答</strong>
        回答前先列出教材支持证据
      </div>
      <div class="item">
        <strong>🔎 可验证反馈</strong>
        点击引用可回到原文高亮位置
      </div>
    </div>

    <p class="note">你可以将此页面替换为真实的图谱渲染组件或 iframe 嵌入版本。</p>
  </div>
</body>
</html>
