<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>教学演示调试工具</title>
  <style>
    body { font-family: Consolas, monospace; padding: 20px; background: #111827; color: #d1fae5; }
    .section { margin: 18px 0; padding: 14px; background: #1f2937; border-radius: 8px; }
    input, button { padding: 10px; margin: 5px; font-size: 14px; }
    input { width: 420px; background: #0b1220; color: #d1fae5; border: 1px solid #34d399; }
    button { background: #34d399; color: #052e16; border: none; cursor: pointer; font-weight: bold; }
    .output { background: #020617; padding: 10px; margin: 10px 0; border: 1px solid #34d399; }
    .error { color: #fca5a5; }
    .success { color: #86efac; }
  </style>
</head>
<body>
  <h1>🔧 教学演示页面调试工具</h1>

  <div class="section">
    <h3>1. 检查配置</h3>
    <label>项目 URL (projectUrl):</label><br>
    <input type="text" id="projectUrl" value="http://localhost:13001" placeholder="http://localhost:13001">
    <br><br>

    <label>demoId:</label><br>
    <input type="text" id="demoId" value="teaching_graph_1" placeholder="teaching_graph_1">
    <br><br>

    <label>route (路由):</label><br>
    <input type="text" id="route" value="/graph1.html" placeholder="/graph1.html">
    <br><br>

    <button onclick="testUrl()">🧪 测试 URL 拼接</button>
    <button onclick="testAccess()">🌐 测试访问</button>
  </div>

  <div class="section">
    <h3>2. 模拟打开教学演示</h3>
    <div class="output" id="result"></div>
  </div>

  <div class="section">
    <h3>3. 实际加载测试</h3>
    <iframe id="testFrame" style="width:100%; height:420px; border:2px solid #34d399;"></iframe>
  </div>

  <script>
    function testUrl() {
      const projectUrl = document.getElementById('projectUrl').value;
      const route = document.getElementById('route').value;
      const baseUrl = projectUrl.replace(/\/$/, '');
      const fullUrl = baseUrl + route;

      document.getElementById('result').innerHTML = `
        <div class="success">✅ URL 拼接结果：</div>
        <div style="padding: 10px;">
          <strong>baseUrl:</strong> ${baseUrl}<br>
          <strong>route:</strong> ${route}<br>
          <strong>完整 URL:</strong> <a href="${fullUrl}" target="_blank" style="color: #7dd3fc;">${fullUrl}</a>
        </div>
        <div style="margin-top: 10px; color: #fde68a;">👉 点击链接检查教学演示页是否可打开</div>
      `;
    }

    function testAccess() {
      const projectUrl = document.getElementById('projectUrl').value;
      const route = document.getElementById('route').value;
      const baseUrl = projectUrl.replace(/\/$/, '');
      const fullUrl = baseUrl + route;

      document.getElementById('result').innerHTML = '<div style="color:#fde68a;">⏳ 正在测试访问...</div>';

      fetch(fullUrl, { mode: 'no-cors' })
        .then(() => {
          document.getElementById('result').innerHTML = `
            <div class="success">✅ URL 可访问</div>
            <div style="padding: 10px;">${fullUrl}</div>
          `;
          document.getElementById('testFrame').src = fullUrl;
        })
        .catch((err) => {
          document.getElementById('result').innerHTML = `
            <div class="error">❌ 访问失败：${err.message}</div>
            <div style="padding: 10px; color: #fca5a5;">
              1. 请确认 dev 服务已启动<br>
              2. 请确认端口和路由正确<br>
              3. 请确认页面文件存在
            </div>
          `;
        });
    }

    window.onload = testUrl;
  </script>
</body>
</html>
